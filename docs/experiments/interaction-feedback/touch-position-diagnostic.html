<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Touch Position Diagnostic</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #5f6b7a;
      --line: #d6dce5;
      --accent: #0078d4;
      --danger: #d83b01;
      --quiet: #9aa4b2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      min-height: 100vh;
    }

    .viewer {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    button {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .pad {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        #fff;
      background-size: 10% 10%;
    }

    .axis-x,
    .axis-y {
      position: absolute;
      pointer-events: none;
      background: rgba(17, 24, 39, 0.22);
    }

    .axis-x {
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
    }

    .axis-y {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
    }

    .dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 34px;
      border: 3px solid var(--accent);
      border-radius: 50%;
      background: rgba(0, 120, 212, 0.18);
      box-shadow: 0 0 0 10px rgba(0, 120, 212, 0.08);
      transform: translate(-50%, -50%);
      transition: opacity 120ms linear;
      pointer-events: none;
    }

    .dot.stale {
      border-color: var(--quiet);
      background: rgba(154, 164, 178, 0.16);
      box-shadow: none;
      opacity: 0.55;
    }

    .dot.hot {
      border-color: var(--danger);
      background: rgba(216, 59, 1, 0.16);
      box-shadow: 0 0 0 10px rgba(216, 59, 1, 0.08);
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      border-left: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 3px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
    }

    .metric.wide {
      grid-column: 1 / -1;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .value {
      margin-top: 3px;
      font-size: 22px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .log {
      flex: 1;
      min-height: 160px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      background: #0f172a;
      color: #dbeafe;
      font: 12px/1.45 Consolas, "Cascadia Mono", monospace;
      white-space: pre-wrap;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 68vh) auto;
      }

      aside {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="viewer">
      <div class="toolbar">
        <button id="lockBtn" class="primary" type="button">Pointer Lock</button>
        <button id="centerBtn" type="button">Center</button>
        <button id="clearBtn" type="button">Clear Log</button>
        <span id="status" class="status">Waiting for diagnostic samples</span>
      </div>
      <div id="pad" class="pad">
        <div class="axis-x"></div>
        <div class="axis-y"></div>
        <div id="dot" class="dot stale"></div>
      </div>
    </section>

    <aside>
      <div>
        <h1>Touch Position Diagnostic</h1>
        <p class="note">
          Use this with firmware diagnostic mode. Each mouse movement sample is
          treated as the current IQS9151 finger1 coordinate, not as a trail.
        </p>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="label">Sample X</div>
          <div id="xValue" class="value">0</div>
        </div>
        <div class="metric">
          <div class="label">Sample Y</div>
          <div id="yValue" class="value">0</div>
        </div>
        <div class="metric">
          <div class="label">Events/s</div>
          <div id="rateValue" class="value">0</div>
        </div>
        <div class="metric">
          <div class="label">Idle ms</div>
          <div id="idleValue" class="value">0</div>
        </div>
        <div class="metric wide">
          <div class="label">State</div>
          <div id="stateValue" class="value">no sample</div>
        </div>
      </div>

      <div id="log" class="log"></div>
    </aside>
  </main>

  <script>
    const pad = document.getElementById("pad");
    const dot = document.getElementById("dot");
    const lockBtn = document.getElementById("lockBtn");
    const centerBtn = document.getElementById("centerBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const xValue = document.getElementById("xValue");
    const yValue = document.getElementById("yValue");
    const rateValue = document.getElementById("rateValue");
    const idleValue = document.getElementById("idleValue");
    const stateValue = document.getElementById("stateValue");

    const range = 800;
    let eventsThisSecond = 0;
    let eventsPerSecond = 0;
    let lastSampleAt = 0;
    let lastX = 0;
    let lastY = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function log(text) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent = `[${time}] ${text}\n` + logEl.textContent;
    }

    function placeDot(sampleX, sampleY) {
      const rect = pad.getBoundingClientRect();
      const normalizedX = clamp((sampleX + range / 2) / range, 0, 1);
      const normalizedY = clamp((sampleY + range / 2) / range, 0, 1);
      const px = normalizedX * rect.width;
      const py = normalizedY * rect.height;

      dot.style.left = `${px}px`;
      dot.style.top = `${py}px`;
      dot.classList.remove("stale");
      dot.classList.toggle("hot", Math.abs(sampleX) > range * 0.42 || Math.abs(sampleY) > range * 0.42);
      xValue.textContent = Math.round(sampleX);
      yValue.textContent = Math.round(sampleY);
      stateValue.textContent = "sample";
    }

    function handleDiagnosticSample(event) {
      event.preventDefault();
      lastX = event.movementX || 0;
      lastY = event.movementY || 0;
      lastSampleAt = performance.now();
      eventsThisSecond++;
      placeDot(lastX, lastY);
    }

    function centerDot() {
      lastX = 0;
      lastY = 0;
      placeDot(0, 0);
      dot.classList.add("stale");
      stateValue.textContent = "centered";
      log("center");
    }

    lockBtn.addEventListener("click", () => {
      pad.requestPointerLock();
    });

    centerBtn.addEventListener("click", centerDot);
    clearBtn.addEventListener("click", () => {
      logEl.textContent = "";
    });

    document.addEventListener("pointerlockchange", () => {
      const locked = document.pointerLockElement === pad;
      statusEl.textContent = locked ? "Pointer Lock active - press Esc to exit" : "Waiting for diagnostic samples";
      log(locked ? "pointer lock on" : "pointer lock off");
    });

    pad.addEventListener("mousemove", handleDiagnosticSample);
    pad.addEventListener("contextmenu", event => event.preventDefault());

    setInterval(() => {
      eventsPerSecond = eventsThisSecond;
      eventsThisSecond = 0;
      rateValue.textContent = eventsPerSecond;
    }, 1000);

    setInterval(() => {
      const now = performance.now();
      const idleMs = lastSampleAt ? Math.round(now - lastSampleAt) : 0;
      idleValue.textContent = idleMs;
      if (!lastSampleAt || idleMs > 250) {
        dot.classList.add("stale");
        stateValue.textContent = "no recent sample";
      }
    }, 80);

    centerDot();
  </script>
</body>
</html>
