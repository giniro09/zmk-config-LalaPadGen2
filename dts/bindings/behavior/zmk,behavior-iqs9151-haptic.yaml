description: IQS9151 haptic behavior

compatible: "zmk,behavior-iqs9151-haptic"

properties:
  display-name:
    type: string

  label:
    type: string
    required: false
    deprecated: true

  "#binding-cells":
    type: int
    required: true
    const: 1

  target-side:
    type: int
    required: true
    enum:
      - 0
      - 1
    description: |
      Target split side for the haptic behavior.
      0 = peripheral/left, 1 = central/right.

binding-cells:
  - pattern
