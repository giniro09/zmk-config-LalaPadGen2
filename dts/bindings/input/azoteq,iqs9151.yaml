description: |
  Azoteq IQS9151 driver placeholder.

compatible: "azoteq,iqs9151"

include: i2c-device.yaml

properties:
  irq-gpios:
    type: phandle-array
    required: true
    description: Interrupt GPIO for IQS9151 driver.
  io-channels:
    type: phandle-array
    required: false
    description: Optional FSR ADC channel used for force interaction input.
  haptic-device:
    type: phandle
    required: false
    description: Optional DRV2605L haptic device on the same I2C bus.
